<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom & Clay — 3D Artisan Floral Atelier</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0806; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Georgia', serif; }
  canvas { display: block; }
  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 10; background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.5) 100%); }
  .brand-group { position: fixed; top: 28px; left: 50%; transform: translateX(-50%); z-index: 20; text-align: center; opacity: 0; transition: opacity 2s ease; }
  .brand-group.show { opacity: 1; }
  .brand { font-size: 0.85rem; letter-spacing: 0.25em; color: rgba(230,210,190,0.55); text-transform: uppercase; }
  .brand-tag { font-size: 0.6rem; letter-spacing: 0.12em; color: rgba(196,132,106,0.25); display: block; margin-top: 5px; font-style: italic; }
  .brand-line { margin: 6px auto 0; width: 0; height: 1px; background: linear-gradient(to right, transparent, rgba(196,132,106,0.35), transparent); transition: width 1.5s ease; }
  .brand-group.show .brand-line { width: 50px; }
  .hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 20; text-align: center; font-size: 0.55rem; letter-spacing: 0.15em; color: rgba(196,132,106,0.22); text-transform: uppercase; opacity: 0; transition: opacity 2s ease; }
  .hint.show { opacity: 1; }
  #loader { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: #0a0806; transition: opacity 0.8s ease; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring { width: 32px; height: 32px; border: 1.5px solid rgba(196,132,106,0.08); border-top-color: rgba(196,132,106,0.4); border-radius: 50%; animation: spin 1.2s cubic-bezier(0.45,0.05,0.55,0.95) infinite; }
  .loader-text { margin-top: 14px; font-size: 0.65rem; letter-spacing: 0.3em; color: rgba(196,132,106,0.25); text-transform: uppercase; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader"><div style="text-align:center"><div class="loader-ring"></div><div class="loader-text">Arranging</div></div></div>
<div class="vignette"></div>
<div class="brand-group" id="brand"><div class="brand">Bloom &amp; Clay</div><div class="brand-line"></div><span class="brand-tag">Artisan Floral Atelier</span></div>
<div class="hint" id="hint">Drag to rotate &middot; Scroll to zoom</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════ SCENE ═══════ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0b08);
scene.fog = new THREE.FogExp2(0x0e0b08, 0.025);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 4.2, 7.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.85;
controls.minPolarAngle = Math.PI * 0.05;
controls.target.set(0, 2.2, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

/* ═══════ LIGHTING ═══════ */
scene.add(new THREE.AmbientLight(0x5a4530, 0.7));

const key = new THREE.DirectionalLight(0xfff4e8, 3.2);
key.position.set(5, 9, 4);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 25;
key.shadow.camera.left = -5; key.shadow.camera.right = 5;
key.shadow.camera.top = 5; key.shadow.camera.bottom = -5;
key.shadow.bias = -0.0004; key.shadow.radius = 3;
scene.add(key);

const fill = new THREE.DirectionalLight(0xd4b89a, 1.0);
fill.position.set(-4, 5, -3);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffd8c0, 0.7);
rim.position.set(-2, 3, 6);
scene.add(rim);

const back = new THREE.DirectionalLight(0xffe8d0, 0.4);
back.position.set(0, 2, -5);
scene.add(back);

const topLight = new THREE.SpotLight(0xfff8f0, 1.5, 18, Math.PI / 5, 0.5, 1);
topLight.position.set(0, 12, 0);
topLight.castShadow = true;
topLight.shadow.mapSize.set(1024, 1024);
scene.add(topLight);

/* ═══════ MATERIALS ═══════ */
const potMat = new THREE.MeshStandardMaterial({ color: 0x8a5832, roughness: 0.65, metalness: 0.05 });
const soilMat = new THREE.MeshStandardMaterial({ color: 0x2c1a0e, roughness: 0.95 });
const tableMat = new THREE.MeshStandardMaterial({ color: 0x281c14, roughness: 0.4, metalness: 0.15 });
const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.7, metalness: 0.0 });
const leafMat = new THREE.MeshStandardMaterial({ color: 0x3d7a35, roughness: 0.65, side: THREE.DoubleSide });

function petalMat(c, r) {
  r = r || 0.4;
  return new THREE.MeshStandardMaterial({ color: c, roughness: r, metalness: 0, side: THREE.DoubleSide });
}

/* ═══════ TABLE ═══════ */
const table = new THREE.Mesh(new THREE.CylinderGeometry(5.5, 5.5, 0.15, 64), tableMat);
table.position.y = -0.08; table.receiveShadow = true;
scene.add(table);

const tableEdgeMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.5, metalness: 0.2 });
const tableEdge = new THREE.Mesh(new THREE.TorusGeometry(5.5, 0.05, 8, 64), tableEdgeMat);
tableEdge.rotation.x = Math.PI / 2;
tableEdge.position.y = 0;
scene.add(tableEdge);

/* ═══════ POT ═══════ */
const pp = [new THREE.Vector2(0, 0), new THREE.Vector2(0.85, 0)];
for (let i = 0; i <= 8; i++) { const t = i / 8; pp.push(new THREE.Vector2(0.85 + Math.sin(t * Math.PI * 0.5) * 0.18, t * 0.15)); }
for (let i = 0; i <= 14; i++) { const t = i / 14; pp.push(new THREE.Vector2(1.03 + t * 0.38 + Math.sin(t * Math.PI) * 0.1, 0.15 + t * 1.65)); }
const ry = 1.8;
pp.push(new THREE.Vector2(1.41, ry), new THREE.Vector2(1.48, ry + 0.03), new THREE.Vector2(1.52, ry + 0.08), new THREE.Vector2(1.48, ry + 0.12), new THREE.Vector2(1.41, ry + 0.13), new THREE.Vector2(1.33, ry + 0.12), new THREE.Vector2(1.26, ry + 0.06));
const potMesh = new THREE.Mesh(new THREE.LatheGeometry(pp, 64), potMat);
potMesh.castShadow = true; potMesh.receiveShadow = true;
scene.add(potMesh);

const innerRimMat = new THREE.MeshStandardMaterial({ color: 0x1a0f08, roughness: 0.9, side: THREE.DoubleSide });
const innerRim = new THREE.Mesh(new THREE.RingGeometry(1.12, 1.33, 64), innerRimMat);
innerRim.rotation.x = -Math.PI / 2;
innerRim.position.y = ry + 0.1;
scene.add(innerRim);

const soilBody = new THREE.Mesh(new THREE.CylinderGeometry(1.18, 1.18, 0.3, 32), soilMat);
soilBody.position.y = ry - 0.1; scene.add(soilBody);
const soilMound = new THREE.Mesh(new THREE.SphereGeometry(1.18, 32, 8, 0, Math.PI * 2, 0, Math.PI * 0.3), soilMat);
soilMound.position.y = ry; soilMound.scale.y = 0.18; scene.add(soilMound);
const potOpenY = ry + 0.08;

/* ═══════ PETAL SHAPE BUILDER ═══════ */
function makePetalGeo(w, h, curl, bulge) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.bezierCurveTo(w * 0.6, h * 0.15, w * 0.95, h * 0.45, w * 0.55, h * 0.78);
  shape.bezierCurveTo(w * 0.3, h * 0.95, w * 0.05, h, 0, h);
  shape.bezierCurveTo(-w * 0.05, h, -w * 0.3, h * 0.95, -w * 0.55, h * 0.78);
  shape.bezierCurveTo(-w * 0.95, h * 0.45, -w * 0.6, h * 0.15, 0, 0);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.006, bevelEnabled: true, bevelThickness: 0.004, bevelSize: 0.004, bevelSegments: 2, curveSegments: 12 });
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    const x = pos.getX(i);
    const t = y / h;
    pos.setZ(i, pos.getZ(i) + t * t * curl + bulge * Math.sin(t * Math.PI) * (1 - Math.abs(x) / (w * 0.6)));
  }
  geo.computeVertexNormals();
  return geo;
}

function makeStem(h, thick, cx, cz) {
  cz = cz || 0;
  const c = new THREE.CubicBezierCurve3(
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(cx * 0.4, h * 0.33, cz * 0.4),
    new THREE.Vector3(cx * 0.8, h * 0.66, cz * 0.8),
    new THREE.Vector3(cx, h, cz)
  );
  const m = new THREE.Mesh(new THREE.TubeGeometry(c, 16, thick, 6, false), stemMat);
  m.castShadow = true;
  return m;
}

function makeLeaf(len, wid, ang) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.bezierCurveTo(wid * 0.6, len * 0.25, wid, len * 0.55, 0, len);
  shape.bezierCurveTo(-wid, len * 0.55, -wid * 0.6, len * 0.25, 0, 0);
  const geo = new THREE.ShapeGeometry(shape);
  const m = new THREE.Mesh(geo, leafMat);
  m.castShadow = true;
  m.rotation.z = ang;
  return m;
}

function addLeaves(stem, h, count) {
  for (let i = 0; i < count; i++) {
    const leaf = makeLeaf(0.3 + Math.random() * 0.12, 0.08 + Math.random() * 0.03, (i % 2 === 0 ? -1 : 1) * (0.5 + Math.random() * 0.5));
    leaf.position.set(i % 2 === 0 ? 0.02 : -0.02, h * (0.28 + i * 0.16), 0);
    leaf.rotation.y = Math.random() * Math.PI * 2;
    stem.add(leaf);
  }
}

/* ═══════ ROSE ═══════ */
function makeRose(sz) {
  const g = new THREE.Group();
  const cols = [0xdc2626, 0xc41e1e, 0xa81818, 0xe03030, 0xb81b1b, 0xd42828];
  // inner bud
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.16, sz * 0.3, sz * 0.06, sz * 0.03), petalMat(0x8b1515, 0.5));
    p.position.set(Math.cos(a) * sz * 0.04, sz * 0.05, Math.sin(a) * sz * 0.04);
    p.rotation.set(-0.8, a, 0); p.castShadow = true; g.add(p);
  }
  // middle layers
  for (let layer = 0; layer < 3; layer++) {
    const n = 7 + layer * 2;
    const r = sz * (0.12 + layer * 0.12);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + layer * 0.35;
      const p = new THREE.Mesh(makePetalGeo(sz * (0.2 + layer * 0.04), sz * (0.32 + layer * 0.04), sz * (0.05 + layer * 0.025), sz * 0.03), petalMat(cols[layer % cols.length], 0.42));
      p.position.set(Math.cos(a) * r, -layer * 0.035, Math.sin(a) * r);
      p.rotation.set(-0.6 + layer * 0.15, a, Math.sin(a) * 0.12); p.castShadow = true; g.add(p);
    }
  }
  // outer petals
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + 0.15;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.28, sz * 0.38, sz * 0.03, sz * 0.04), petalMat(i % 2 === 0 ? 0xef4444 : 0xf87171, 0.38));
    p.position.set(Math.cos(a) * sz * 0.36, -0.11, Math.sin(a) * sz * 0.36);
    p.rotation.set(-0.25, a, Math.sin(a) * 0.15); p.castShadow = true; g.add(p);
  }
  return g;
}

/* ═══════ PEONY ═══════ */
function makePeony(sz) {
  const g = new THREE.Group();
  const cols = [0xf9a8d4, 0xfbcfe8, 0xf472b6, 0xec4899, 0xfda4af];
  for (let layer = 0; layer < 5; layer++) {
    const n = 10 - layer;
    const r = sz * (0.18 + layer * 0.14);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + layer * 0.3;
      const p = new THREE.Mesh(makePetalGeo(sz * (0.16 + layer * 0.025), sz * (0.26 + layer * 0.03), sz * 0.04, sz * 0.035), petalMat(cols[layer % cols.length], 0.35));
      p.position.set(Math.cos(a) * r, -layer * 0.03, Math.sin(a) * r);
      p.rotation.set(-0.65 + layer * 0.1, a, Math.sin(a) * 0.08); p.castShadow = true; g.add(p);
    }
  }
  // stamens
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, sz * 0.1, 4), new THREE.MeshStandardMaterial({ color: 0xc08040, roughness: 0.6 }));
    s.position.set(Math.cos(a) * sz * 0.05, sz * 0.02, Math.sin(a) * sz * 0.05);
    s.rotation.z = (i % 2 === 0 ? 0.2 : -0.2); g.add(s);
    const an = new THREE.Mesh(new THREE.SphereGeometry(0.01, 6, 6), new THREE.MeshStandardMaterial({ color: 0xd4a040, roughness: 0.5 }));
    an.position.set(Math.cos(a) * sz * 0.06, sz * 0.07, Math.sin(a) * sz * 0.06); g.add(an);
  }
  return g;
}

/* ═══════ SUNFLOWER ═══════ */
function makeSunflower(sz) {
  const g = new THREE.Group();
  for (let i = 0; i < 22; i++) {
    const a = (i / 22) * Math.PI * 2;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.055, sz * 0.42, sz * 0.025, sz * 0.015), petalMat(i % 3 === 0 ? 0xfacc15 : (i % 3 === 1 ? 0xfde68a : 0xfbbf24), 0.4));
    p.position.set(Math.cos(a) * sz * 0.3, 0, Math.sin(a) * sz * 0.3);
    p.rotation.set(0.1, -a + Math.PI / 2, Math.PI * 0.28); p.castShadow = true; g.add(p);
  }
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2 + 0.12;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.04, sz * 0.28, sz * 0.018, sz * 0.012), petalMat(0xeab308, 0.42));
    p.position.set(Math.cos(a) * sz * 0.18, 0, Math.sin(a) * sz * 0.18);
    p.rotation.set(0.15, -a + Math.PI / 2, Math.PI * 0.32); p.castShadow = true; g.add(p);
  }
  const disk = new THREE.Mesh(new THREE.CylinderGeometry(sz * 0.22, sz * 0.22, sz * 0.07, 20), new THREE.MeshStandardMaterial({ color: 0x5c3310, roughness: 0.85 }));
  disk.rotation.x = Math.PI / 2; g.add(disk);
  for (let i = 0; i < 25; i++) {
    const t = i / 25;
    const a = t * Math.PI * 2 * 7;
    const r = t * sz * 0.18;
    const seed = new THREE.Mesh(new THREE.SphereGeometry(0.01, 4, 4), new THREE.MeshStandardMaterial({ color: 0x3a1a05, roughness: 0.9 }));
    seed.position.set(Math.cos(a) * r, Math.sin(a) * r, sz * 0.04); g.add(seed);
  }
  return g;
}

/* ═══════ ORCHID ═══════ */
function makeOrchid(sz) {
  const g = new THREE.Group();
  const dorsal = new THREE.Mesh(makePetalGeo(sz * 0.18, sz * 0.38, sz * 0.05, sz * 0.025), petalMat(0xf0a0c0, 0.35));
  dorsal.position.set(0, sz * 0.16, 0); dorsal.rotation.x = -0.3; dorsal.castShadow = true; g.add(dorsal);
  [-1, 1].forEach(function(side) {
    const lat = new THREE.Mesh(makePetalGeo(sz * 0.22, sz * 0.34, sz * 0.04, sz * 0.025), petalMat(0xe879a8, 0.35));
    lat.position.set(side * sz * 0.16, 0.02, 0);
    lat.rotation.set(-0.1, side * 0.4, side * 0.55); lat.castShadow = true; g.add(lat);
  });
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI * 2 + Math.PI / 6;
    const sep = new THREE.Mesh(makePetalGeo(sz * 0.1, sz * 0.32, sz * 0.03, sz * 0.015), petalMat(0xd94f8a, 0.42));
    sep.position.set(Math.cos(a) * sz * 0.1, -sz * 0.07, Math.sin(a) * sz * 0.04);
    sep.rotation.set(0.3, a, 0); sep.castShadow = true; g.add(sep);
  }
  const lip = new THREE.Mesh(makePetalGeo(sz * 0.16, sz * 0.2, sz * 0.08, sz * 0.05), petalMat(0xc94080, 0.45));
  lip.position.set(0, -sz * 0.07, sz * 0.05); lip.rotation.set(0.5, 0, 0); g.add(lip);
  return g;
}

/* ═══════ DAISY ═══════ */
function makeDaisy(sz) {
  const g = new THREE.Group();
  for (let layer = 0; layer < 2; layer++) {
    const n = layer === 0 ? 14 : 10;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + layer * 0.15;
      const c = layer === 0 ? (i % 2 === 0 ? 0xfafafa : 0xf0f0f0) : (i % 2 === 0 ? 0xf5f5f5 : 0xe8e8e8);
      const p = new THREE.Mesh(makePetalGeo(sz * 0.045, sz * (0.32 - layer * 0.04), sz * 0.015, sz * 0.008), petalMat(c, 0.3));
      p.position.set(Math.cos(a) * sz * (0.15 + layer * 0.035), -layer * 0.012, Math.sin(a) * sz * (0.15 + layer * 0.035));
      p.rotation.set(0.05, -a + Math.PI / 2, Math.PI * 0.3 + layer * 0.04); p.castShadow = true; g.add(p);
    }
  }
  const center = new THREE.Mesh(new THREE.SphereGeometry(sz * 0.11, 12, 10), new THREE.MeshStandardMaterial({ color: 0xf0c830, roughness: 0.6 }));
  center.scale.y = 0.5; g.add(center);
  return g;
}

/* ═══════ TULIP ═══════ */
function makeTulip(sz) {
  const g = new THREE.Group();
  const cols = [0xdc2626, 0xc41e1e, 0xe03030, 0xb81b1b, 0xd42828, 0xfca5a5];
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.16, sz * 0.42, sz * 0.07, sz * 0.04), petalMat(cols[i % cols.length], 0.4));
    p.position.set(Math.cos(a) * sz * 0.07, 0, Math.sin(a) * sz * 0.07);
    p.rotation.set(-0.5 + Math.abs(Math.cos(a)) * 0.2, a, Math.sin(a) * 0.12); p.castShadow = true; g.add(p);
  }
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI * 2 + 0.5;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.1, sz * 0.32, sz * 0.05, sz * 0.03), petalMat(0xfca5a5, 0.35));
    p.position.set(Math.cos(a) * sz * 0.03, sz * 0.05, Math.sin(a) * sz * 0.03);
    p.rotation.set(-0.7, a, 0); g.add(p);
  }
  return g;
}

/* ═══════ CARNATION ═══════ */
function makeCarnation(sz) {
  const g = new THREE.Group();
  const cols = [0xf472b6, 0xec4899, 0xfda4af, 0xf9a8d4, 0xfb7185];
  for (let layer = 0; layer < 5; layer++) {
    const n = 12 - layer * 2;
    const r = sz * (0.1 + layer * 0.11);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + layer * 0.25;
      const p = new THREE.Mesh(makePetalGeo(sz * (0.09 + layer * 0.012), sz * (0.13 + layer * 0.018), sz * 0.06, sz * 0.05), petalMat(cols[layer % cols.length], 0.35));
      p.position.set(Math.cos(a) * r, -layer * 0.025, Math.sin(a) * r);
      p.rotation.set(-0.45 + layer * 0.08, a, Math.sin(a + layer) * 0.15); p.castShadow = true; g.add(p);
    }
  }
  const core = new THREE.Mesh(new THREE.SphereGeometry(sz * 0.07, 8, 8), petalMat(0xbe185d, 0.5));
  core.scale.y = 0.5; g.add(core);
  return g;
}

/* ═══════ LILY ═══════ */
function makeLily(sz) {
  const g = new THREE.Group();
  const cols = [0xfef3c7, 0xfde68a, 0xfcd34d, 0xfbbf24, 0xfef9c3, 0xfde047];
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const p = new THREE.Mesh(makePetalGeo(sz * 0.07, sz * 0.5, sz * 0.025, sz * 0.015), petalMat(cols[i % cols.length], 0.32));
    p.position.set(Math.cos(a) * sz * 0.1, 0, Math.sin(a) * sz * 0.1);
    p.rotation.set(0.18, -a + Math.PI / 2, Math.PI * 0.4); p.castShadow = true; g.add(p);
  }
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + 0.3;
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, sz * 0.2, 4), new THREE.MeshStandardMaterial({ color: 0x4a7030, roughness: 0.7 }));
    s.position.set(Math.cos(a) * sz * 0.04, sz * 0.09, Math.sin(a) * sz * 0.04);
    s.rotation.z = (i % 2 === 0 ? 0.12 : -0.12); g.add(s);
    const an = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.01, 0.035, 6), new THREE.MeshStandardMaterial({ color: 0x8b5a20, roughness: 0.55 }));
    an.position.set(Math.cos(a) * sz * 0.05, sz * 0.18, Math.sin(a) * sz * 0.05);
    an.rotation.z = (i % 2 === 0 ? 0.3 : -0.3); g.add(an);
  }
  const pist = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.003, sz * 0.22, 6), new THREE.MeshStandardMaterial({ color: 0x6a9040, roughness: 0.6 }));
  pist.position.y = sz * 0.1; g.add(pist);
  return g;
}

/* ═══════ LAVENDER ═══════ */
function makeLavender(sz) {
  const g = new THREE.Group();
  const cols = [0xb070d0, 0x9060c0, 0x8050b0, 0xa060d0, 0xc080e0, 0x9070c0];
  for (let i = 0; i < 10; i++) {
    const y = i * sz * 0.065;
    [-1, 1].forEach(function(side) {
      const p = new THREE.Mesh(makePetalGeo(sz * 0.035, sz * 0.07, sz * 0.008, sz * 0.006), petalMat(cols[i % cols.length], 0.45));
      p.position.set(side * sz * 0.018, y, 0);
      p.rotation.set(0, 0, side * 0.4); p.castShadow = true; g.add(p);
    });
  }
  return g;
}

/* ═══════ 15 FLOWERS ═══════ */
const flowerDefs = [
  { type: 'rose',      h: 2.5,  cx: -0.3,  cz: 0.2,   sz: 0.5,  px: -0.45, pz: 0.25,  ry: 0.2 },
  { type: 'rose',      h: 2.35, cx: 0.2,   cz: -0.15,  sz: 0.45, px: 0.15,  pz: -0.35, ry: 1.8 },
  { type: 'rose',      h: 2.15, cx: -0.12, cz: -0.3,  sz: 0.42, px: -0.2,  pz: -0.55, ry: 3.2 },
  { type: 'peony',     h: 2.25, cx: 0.3,   cz: 0.1,   sz: 0.6,  px: 0.5,   pz: 0.15,  ry: 0.7 },
  { type: 'peony',     h: 2.05, cx: -0.22, cz: 0.32,  sz: 0.55, px: -0.55, pz: -0.1,  ry: 2.5 },
  { type: 'sunflower', h: 2.95, cx: 0.05,  cz: -0.03, sz: 0.65, px: -0.05, pz: 0.05,  ry: 0.4 },
  { type: 'orchid',    h: 2.05, cx: -0.45, cz: 0.0,   sz: 0.45, px: 0.35,  pz: 0.4,   ry: 1.1 },
  { type: 'orchid',    h: 1.95, cx: 0.4,   cz: -0.25, sz: 0.4,  px: 0.55,  pz: -0.25, ry: 3.8 },
  { type: 'daisy',     h: 2.35, cx: 0.32,  cz: 0.22,  sz: 0.45, px: 0.0,   pz: 0.45,  ry: 2.0 },
  { type: 'daisy',     h: 2.15, cx: -0.38, cz: -0.18, sz: 0.4,  px: -0.5,  pz: 0.5,   ry: 4.2 },
  { type: 'tulip',     h: 2.45, cx: 0.12,  cz: -0.38, sz: 0.4,  px: 0.4,   pz: -0.45, ry: 0.9 },
  { type: 'tulip',     h: 2.25, cx: -0.28, cz: 0.28,  sz: 0.38, px: -0.35, pz: 0.55,  ry: 2.8 },
  { type: 'carnation', h: 2.2,  cx: 0.38,  cz: 0.32,  sz: 0.45, px: 0.25,  pz: 0.6,   ry: 1.5 },
  { type: 'lily',      h: 2.55, cx: -0.08, cz: -0.48, sz: 0.5,  px: -0.6,  pz: -0.4,  ry: 3.5 },
  { type: 'lavender',  h: 2.35, cx: 0.48,  cz: 0.0,   sz: 0.35, px: 0.65,  pz: 0.0,   ry: 5.0 },
];

const flowerGroup = new THREE.Group();
const flowerWrappers = [];

flowerDefs.forEach(function(def) {
  const stem = makeStem(def.h, 0.02, def.cx, def.cz);
  addLeaves(stem, def.h, 2 + Math.floor(Math.random() * 2));
  let head;
  switch (def.type) {
    case 'rose':      head = makeRose(def.sz); break;
    case 'peony':     head = makePeony(def.sz); break;
    case 'sunflower': head = makeSunflower(def.sz); break;
    case 'orchid':    head = makeOrchid(def.sz); break;
    case 'daisy':     head = makeDaisy(def.sz); break;
    case 'tulip':     head = makeTulip(def.sz); break;
    case 'carnation': head = makeCarnation(def.sz); break;
    case 'lily':      head = makeLily(def.sz); break;
    case 'lavender':  head = makeLavender(def.sz); break;
  }
  head.position.y = def.h;
  stem.add(head);
  const wrap = new THREE.Group();
  wrap.add(stem);
  wrap.position.set(def.px, potOpenY - 0.15, def.pz);
  wrap.rotation.y = def.ry;
  wrap.scale.set(0, 0, 0);
  wrap.userData.targetY = potOpenY - 0.15;
  wrap.userData.inserted = false;
  flowerGroup.add(wrap);
  flowerWrappers.push(wrap);
});

scene.add(flowerGroup);

/* ═══════ CONTACT SHADOW ═══════ */
const sc = document.createElement('canvas');
sc.width = 256; sc.height = 256;
const sx = sc.getContext('2d');
const grd = sx.createRadialGradient(128, 128, 8, 128, 128, 128);
grd.addColorStop(0, 'rgba(0,0,0,0.55)');
grd.addColorStop(0.5, 'rgba(0,0,0,0.25)');
grd.addColorStop(1, 'rgba(0,0,0,0)');
sx.fillStyle = grd; sx.fillRect(0, 0, 256, 256);
const shadowMesh = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 4.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(sc), transparent: true, depthWrite: false }));
shadowMesh.rotation.x = -Math.PI / 2; shadowMesh.position.y = 0.02;
scene.add(shadowMesh);

/* ═══════ DUST ═══════ */
const DN = 60;
const dustPos = new Float32Array(DN * 3);
const dustSpd = [];
for (let i = 0; i < DN; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 9;
  dustPos[i * 3 + 1] = Math.random() * 5;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 9;
  dustSpd.push(0.0015 + Math.random() * 0.003);
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: 0xd4a080, size: 0.035, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true })));

/* ═══════ INSERT ANIMATION ═══════ */
function easeOutBounce(t) {
  var n1 = 7.5625, d1 = 2.75;
  if (t < 1 / d1) return n1 * t * t;
  if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
  if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
  return n1 * (t -= 2.625 / d1) * t + 0.984375;
}

function startInsertSequence() {
  var i = 0;
  function insertNext() {
    if (i >= flowerWrappers.length) return;
    var wrap = flowerWrappers[i];
    var targetY = wrap.userData.targetY;
    var startY = -1.5;
    var dur = 850;
    var t0 = performance.now();
    function step(now) {
      var t = Math.min((now - t0) / dur, 1);
      var e = easeOutBounce(t);
      wrap.scale.set(e, e, e);
      wrap.position.y = startY + (targetY - startY) * e;
      if (t < 1) { requestAnimationFrame(step); }
      else { wrap.scale.set(1, 1, 1); wrap.position.y = targetY; wrap.userData.inserted = true; i++; setTimeout(insertNext, 380); }
    }
    requestAnimationFrame(step);
  }
  insertNext();
}

/* ═══════ RENDER LOOP ═══════ */
var clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();
  flowerWrappers.forEach(function(w, idx) {
    if (!w.userData.inserted) return;
    var stem = w.children[0];
    if (stem) {
      stem.rotation.z = Math.sin(t * 0.6 + idx * 1.1) * 0.015;
      stem.rotation.x = Math.sin(t * 0.4 + idx * 0.8) * 0.01;
    }
  });
  var dp = dustGeo.attributes.position.array;
  for (var i = 0; i < DN; i++) {
    dp[i * 3 + 1] += dustSpd[i];
    dp[i * 3] += Math.sin(t * 0.3 + i) * 0.0006;
    if (dp[i * 3 + 1] > 5.5) { dp[i * 3 + 1] = -0.5; dp[i * 3] = (Math.random() - 0.5) * 9; dp[i * 3 + 2] = (Math.random() - 0.5) * 9; }
  }
  dustGeo.attributes.position.needsUpdate = true;
  controls.update();
  renderer.render(scene, camera);
}

/* ═══════ INIT ═══════ */
window.addEventListener('resize', function() { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
animate();
setTimeout(function() { document.getElementById('loader').classList.add('hidden'); document.getElementById('brand').classList.add('show'); }, 800);
setTimeout(function() { document.getElementById('hint').classList.add('show'); startInsertSequence(); }, 1600);
</script>
