<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom & Clay — Artisan Floral Atelier</title>
<meta name="description" content="Handcrafted botanical arrangements in artisanal ceramics.">
<meta name="theme-color" content="#0A0806">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════════════════════════
     RESET & BASE
     ═══════════════════════════════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at 50% 60%, #0E0B08 0%, #080605 50%, #030201 100%);
    color: #F0ECE6;
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  /* ═══════════════════════════════════════════════════════════════
     VIGNETTE OVERLAY
     ═══════════════════════════════════════════════════════════════ */
  .vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 30;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
  }

  /* ═══════════════════════════════════════════════════════════════
     SPOTLIGHT BACKLIGHT
     ═══════════════════════════════════════════════════════════════ */
  .backlight {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 2.5s ease;
    background: radial-gradient(ellipse at 50% 55%, rgba(196,132,106,0.08) 0%, rgba(217,160,120,0.04) 25%, transparent 50%);
  }
  .backlight.show { opacity: 1; }

  /* ═══════════════════════════════════════════════════════════════
     SURFACE / TABLE
     ═══════════════════════════════════════════════════════════════ */
  .surface {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 32vh;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(to top, 
      rgba(40,28,20,1) 0%, 
      rgba(40,28,20,0.9) 20%, 
      rgba(40,28,20,0.4) 60%, 
      transparent 100%
    );
  }
  .surface::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, 
      transparent 15%, 
      rgba(196,132,106,0.12) 40%, 
      rgba(196,132,106,0.15) 50%, 
      rgba(196,132,106,0.12) 60%, 
      transparent 85%
    );
  }
  .surface::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 480px; height: 80px;
    background: radial-gradient(ellipse at 50% 0%, 
      rgba(196,132,106,0.04) 0%, 
      transparent 70%
    );
  }

  /* Surface grain texture */
  .surface-grain {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 32vh;
    pointer-events: none;
    z-index: 2;
    opacity: 0.15;
    mix-blend-mode: overlay;
  }
  .surface-grain::before {
    content: '';
    position: absolute; inset: 0;
    background-image: 
      repeating-linear-gradient(87deg, transparent, transparent 60px, rgba(0,0,0,0.03) 60px, rgba(0,0,0,0.03) 61px),
      repeating-linear-gradient(93deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px);
  }

  /* ═══════════════════════════════════════════════════════════════
     SCENE CONTAINER
     ═══════════════════════════════════════════════════════════════ */
  .scene-wrap {
    position: relative;
    z-index: 10;
    perspective: 1200px;
    transform-style: preserve-3d;
  }

  .scene {
    position: relative;
    width: 650px;
    height: 700px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    transform-style: preserve-3d;
    transform-origin: center bottom;
  }

  .scene::before {
    content: '';
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 550px;
    height: 550px;
    background: radial-gradient(ellipse, rgba(196,132,106,0.06) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Contact shadow under pot */
  .contact-shadow {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
    z-index: 3;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .contact-shadow.show {
    opacity: 1;
    animation: shadowPulse 4s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%,100% { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 0.7; }
    50% { transform: translateX(-50%) scaleX(1.04) scaleY(0.96); opacity: 0.5; }
  }

  /* Pot reflection on surface */
  .pot-reflection {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%) scaleY(-1) skewX(2deg);
    width: 300px;
    height: 100px;
    background: linear-gradient(to top, 
      rgba(196,132,106,0.06) 0%,
      rgba(196,132,106,0.03) 30%,
      transparent 100%
    );
    z-index: 2;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
    border-radius: 50%;
    filter: blur(6px);
  }
  .pot-reflection.show { opacity: 1; }

  /* ═══════════════════════════════════════════════════════════════
     POT
     ═══════════════════════════════════════════════════════════════ */
  .pot-wrap {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
  }
  .pot-wrap svg {
    display: block;
    filter: drop-shadow(0 25px 45px rgba(0,0,0,0.55));
  }

  /* ═══════════════════════════════════════════════════════════════
     FLOWERS
     ═══════════════════════════════════════════════════════════════ */
  .flower {
    position: absolute;
    bottom: 182px;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.3));
    will-change: transform, opacity;
  }

  /* 6 positions spread across pot */
  .flower[data-pos="0"] { left: 50%; margin-left: -105px; }
  .flower[data-pos="1"] { left: 50%; margin-left: -62px; }
  .flower[data-pos="2"] { left: 50%; margin-left: -20px; }
  .flower[data-pos="3"] { left: 50%; margin-left: 22px; }
  .flower[data-pos="4"] { left: 50%; margin-left: 62px; }
  .flower[data-pos="5"] { left: 50%; margin-left: 100px; }

  .flower.dropping {
    animation: drop 1.3s cubic-bezier(0.22, 0.68, 0.35, 1) forwards;
  }
  .flower.placed { opacity: 1; }

  @keyframes drop {
    0% {
      opacity: 0;
      transform: translateY(-420px) scale(0.3) rotate(-20deg);
      filter: blur(6px) drop-shadow(0 6px 18px rgba(0,0,0,0.3));
    }
    15% { opacity: 1; filter: blur(0) drop-shadow(0 6px 18px rgba(0,0,0,0.3)); }
    55% { transform: translateY(12px) scale(1.04) rotate(3deg); }
    72% { transform: translateY(-6px) scale(0.97) rotate(-1.5deg); }
    86% { transform: translateY(3px) scale(1.01) rotate(0.6deg); }
    95% { transform: translateY(-1px) scale(0.995); }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1) rotate(0deg);
      filter: blur(0) drop-shadow(0 6px 18px rgba(0,0,0,0.3));
    }
  }

  /* Sway animations - each unique */
  .flower.placed.s0 { animation: s0 4.5s ease-in-out infinite 0.2s; }
  .flower.placed.s1 { animation: s1 5.5s ease-in-out infinite 0.4s; }
  .flower.placed.s2 { animation: s2 4s ease-in-out infinite 0.3s; }
  .flower.placed.s3 { animation: s3 6s ease-in-out infinite 0.1s; }
  .flower.placed.s4 { animation: s4 5s ease-in-out infinite 0.5s; }
  .flower.placed.s5 { animation: s5 4.8s ease-in-out infinite 0.6s; }

  @keyframes s0{0%,100%{transform:rotate(0)}50%{transform:rotate(1.2deg)}}
  @keyframes s1{0%,100%{transform:rotate(0)}50%{transform:rotate(-0.9deg)}}
  @keyframes s2{0%,100%{transform:rotate(0)}50%{transform:rotate(0.8deg)}}
  @keyframes s3{0%,100%{transform:rotate(0)}50%{transform:rotate(-1.3deg)}}
  @keyframes s4{0%,100%{transform:rotate(0)}50%{transform:rotate(1deg)}}
  @keyframes s5{0%,100%{transform:rotate(0)}50%{transform:rotate(-0.7deg)}}

  /* Edge light hint on flowers */
  .flower.placed::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,220,180,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 11;
    mix-blend-mode: overlay;
  }

  /* ═══════════════════════════════════════════════════════════════
     DUST PARTICLES (on flower drop)
     ═══════════════════════════════════════════════════════════════ */
  .dust {
    position: absolute;
    width: 2.5px;
    height: 2.5px;
    background: #C4846A;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 15;
  }
  .dust.burst {
    animation: dp 0.6s ease-out forwards;
  }
  @keyframes dp {
    0% { opacity: 0.8; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
  }

  /* ═══════════════════════════════════════════════════════════════
     AMBIENT PARTICLES — three layers
     ═══════════════════════════════════════════════════════════════ */

  /* Layer 1: Tiny golden specks (dust motes) */
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 4; }
  .spec {
    position: absolute;
    border-radius: 50%;
    animation: specFloat linear infinite;
  }
  @keyframes specFloat {
    0% { opacity: 0; transform: translateY(100vh) translateX(0) scale(0.2); }
    8% { opacity: var(--opacity, 0.5); }
    85% { opacity: var(--opacity, 0.5); }
    100% { opacity: 0; transform: translateY(-5vh) translateX(var(--drift, 0)) scale(1); }
  }

  /* Layer 2: Glowing fireflies */
  .firefly {
    position: fixed;
    pointer-events: none;
    z-index: 4;
    border-radius: 50%;
    opacity: 0;
    animation: fireflyFloat ease-in-out infinite;
  }
  @keyframes fireflyFloat {
    0%, 100% { 
      opacity: 0; 
      transform: translate(0, 0) scale(0.3); 
    }
    10% { 
      opacity: var(--fly-opacity, 0.6); 
    }
    50% { 
      transform: translate(var(--fly-x, 30px), var(--fly-y, -20px)) scale(1); 
    }
    90% { 
      opacity: var(--fly-opacity, 0.6); 
    }
  }

  /* Firefly inner glow */
  .firefly::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: inherit;
    filter: blur(4px);
    opacity: 0.5;
    animation: fireflyPulse 2s ease-in-out infinite alternate;
  }
  @keyframes fireflyPulse {
    0% { opacity: 0.3; transform: scale(0.8); }
    100% { opacity: 0.7; transform: scale(1.2); }
  }

  /* Layer 3: Pollen/dust drifting horizontally */
  .pollen {
    position: fixed;
    pointer-events: none;
    z-index: 4;
    border-radius: 50%;
    opacity: 0;
    animation: pollenDrift linear infinite;
  }
  @keyframes pollenDrift {
    0% { 
      opacity: 0; 
      transform: translateX(-20px) translateY(0) scale(0.5); 
    }
    10% { opacity: var(--pol-opacity, 0.25); }
    80% { opacity: var(--pol-opacity, 0.25); }
    100% { 
      opacity: 0; 
      transform: translateX(var(--pol-x, 40px)) translateY(var(--pol-y, -30px)) scale(0.8); 
    }
  }

  /* ═══════════════════════════════════════════════════════════════
     BRAND / TYPOGRAPHY
     ═══════════════════════════════════════════════════════════════ */
  .brand-group {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    text-align: center;
    opacity: 0;
    transition: opacity 1.2s ease, transform 1.2s ease;
    transform: translateX(-50%) translateY(-12px);
  }
  .brand-group.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.28em;
    color: rgba(230,210,190,0.6);
    text-transform: uppercase;
  }

  .brand-underline {
    margin: 8px auto 0;
    width: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(196,132,106,0.4), transparent);
    transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .brand-group.show .brand-underline {
    width: 60px;
  }

  .brand-tag {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: rgba(196,132,106,0.2);
    margin-top: 6px;
    display: block;
  }

  /* ═══════════════════════════════════════════════════════════════
     QUOTE
     ═══════════════════════════════════════════════════════════════ */
  .quote-group {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    text-align: center;
    opacity: 0;
    transition: opacity 1.8s ease, transform 1.2s ease;
    transform: translateX(-50%) translateY(12px);
  }
  .quote-group.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 0.9rem;
    color: rgba(196,132,106,0.3);
    letter-spacing: 0.05em;
  }

  .quote-flourish {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .quote-group.show .quote-flourish {
    opacity: 1;
    transition-delay: 0.6s;
  }

  .quote-flourish-line {
    width: 24px;
    height: 1px;
    background: rgba(196,132,106,0.15);
  }

  .quote-flourish-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(196,132,106,0.2);
  }

  /* ═══════════════════════════════════════════════════════════════
     ACCENT CORNER DECORATIONS
     ═══════════════════════════════════════════════════════════════ */
  .corner {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 2s ease;
  }
  .corner.show { opacity: 1; }

  .corner-tl {
    top: 20px; left: 20px;
    width: 30px; height: 30px;
    border-top: 1px solid rgba(196,132,106,0.1);
    border-left: 1px solid rgba(196,132,106,0.1);
  }
  .corner-tr {
    top: 20px; right: 20px;
    width: 30px; height: 30px;
    border-top: 1px solid rgba(196,132,106,0.1);
    border-right: 1px solid rgba(196,132,106,0.1);
  }
  .corner-bl {
    bottom: 20px; left: 20px;
    width: 30px; height: 30px;
    border-bottom: 1px solid rgba(196,132,106,0.1);
    border-left: 1px solid rgba(196,132,106,0.1);
  }
  .corner-br {
    bottom: 20px; right: 20px;
    width: 30px; height: 30px;
    border-bottom: 1px solid rgba(196,132,106,0.1);
    border-right: 1px solid rgba(196,132,106,0.1);
  }

  /* ═══════════════════════════════════════════════════════════════
     INITIAL LOADER
     ═══════════════════════════════════════════════════════════════ */
  .loader {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #080605;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .loader.hidden { opacity: 0; }

  .loader-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .loader-ring {
    width: 32px; height: 32px;
    border: 1.5px solid rgba(196,132,106,0.08);
    border-top-color: rgba(196,132,106,0.35);
    border-radius: 50%;
    animation: spin 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Playfair Display', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: rgba(196,132,106,0.2);
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* ═══════════════════════════════════════════════════════════════
     REDUCED MOTION
     ═══════════════════════════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .flower.dropping { animation: none !important; opacity: 1 !important; transform: none !important; }
    .flower.placed { animation: none !important; }
    .dust.burst { animation: none !important; }
    .spec { animation: none !important; }
    .firefly { display: none; }
    .pollen { display: none; }
    .contact-shadow { animation: none; }
    .loader { display: none; }
  }

  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════════════════════════ */
  @media (max-width: 700px) {
    .scene { transform: scale(0.55); transform-origin: center bottom; }
    .brand-group { top: 20px; }
    .brand { font-size: 0.75rem; letter-spacing: 0.2em; }
    .quote { font-size: 0.75rem; }
    .corner { display: none; }
    .quote-group { bottom: 20px; }
    .pot-reflection { display: none; }
    .surface { height: 25vh; }
    .surface-grain { display: none; }
  }

  @media (max-width: 450px) {
    .scene { transform: scale(0.4); transform-origin: center bottom; }
    .brand-tag { display: none; }
    .brand-underline { margin-top: 5px; }
  }

  @media (min-height: 900px) {
    .scene { transform: scale(1.1); transform-origin: center bottom; }
  }

  @media (min-width: 1200px) and (min-height: 800px) {
    .scene { transform: scale(1.15); transform-origin: center bottom; }
  }

  /* ═══════════════════════════════════════════════════════════════
     PERF / ACCESSIBILITY
     ═══════════════════════════════════════════════════════════════ */
  @media (prefers-color-scheme: light) {
    body { background: radial-gradient(ellipse at 50% 60%, #F5F0EB 0%, #EEE8E0 50%, #E8DFD5 100%); }
    .vignette { display: none; }
    .brand { color: rgba(80,50,30,0.5); }
    .quote { color: rgba(80,50,30,0.3); }
    .surface { background: linear-gradient(to top, rgba(180,140,100,0.3) 0%, transparent 100%); }
    .surface::before { background: linear-gradient(to right, transparent 15%, rgba(120,80,50,0.15) 40%, rgba(120,80,50,0.2) 50%, rgba(120,80,50,0.15) 60%, transparent 85%); }
  }
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-text">Preparing</div>
  </div>
</div>

<!-- Vignette overlay -->
<div class="vignette"></div>

<!-- Backlight -->
<div class="backlight" id="backlight"></div>

<!-- Surface / Table -->
<div class="surface"></div>
<div class="surface-grain"></div>

<!-- Corner frames -->
<div class="corner corner-tl" id="crTL"></div>
<div class="corner corner-tr" id="crTR"></div>
<div class="corner corner-bl" id="crBL"></div>
<div class="corner corner-br" id="crBR"></div>

<!-- Brand -->
<div class="brand-group" id="brandGroup">
  <div class="brand">Bloom &amp; Clay</div>
  <div class="brand-underline"></div>
  <span class="brand-tag">Artisan Floral Atelier</span>
</div>

<!-- Quote -->
<div class="quote-group" id="quoteGroup">
  <div class="quote">"Six petals, one love"</div>
  <div class="quote-flourish">
    <span class="quote-flourish-line"></span>
    <span class="quote-flourish-dot"></span>
    <span class="quote-flourish-line"></span>
  </div>
</div>

<!-- Ambient particles container -->
<div class="ambient" id="ambient"></div>

<!-- Fireflies container -->
<div class="ambient ambient-fireflies" id="fireflies"></div>

<!-- Pollen container -->
<div class="ambient ambient-pollen" id="pollen"></div>

<!-- Pot reflection -->
<div class="pot-reflection" id="potReflection"></div>

<!-- Contact shadow -->
<div class="contact-shadow" id="contactShadow"></div>

<div class="scene-wrap">
<div class="scene" id="scene">

  <!-- ═══ 1: RED ROSE (far left) ═══ -->
  <div class="flower" id="f1" data-pos="0">
    <svg width="95" height="200" viewBox="0 0 95 200" fill="none">
      <path d="M47 200 Q46 170 49 145 Q52 120 47 90 Q45 75 47 60" stroke="#2D5A27" stroke-width="2.8" stroke-linecap="round" fill="none"/>
      <path d="M47 165 Q35 155 27 148" stroke="#2D5A27" stroke-width="2" stroke-linecap="round" fill="none"/>

<script>
(function(){
  'use strict';

  /* ─────────────────────────────────────────────
     LOADER → FADE IN
     ───────────────────────────────────────────── */
  const loader = document.getElementById('loader');
  window.addEventListener('load', () => {
    setTimeout(() => loader.classList.add('hidden'), 400);
    setTimeout(() => { loader.style.display = 'none'; init(); }, 1200);
  });
  // Fallback if load event already fired
  if (document.readyState === 'complete') {
    setTimeout(() => loader.classList.add('hidden'), 200);
    setTimeout(() => { loader.style.display = 'none'; init(); }, 1000);
  }

  function init() {

    /* ─────────────────────────────────────────────
       AMBIENT SPECKS (dust motes)
       ───────────────────────────────────────────── */
    const ambient = document.getElementById('ambient');
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('div');
      s.className = 'spec';
      const size = 1 + Math.random() * 1.5;
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px; height: ${size}px;
        background: rgba(196,132,106,${0.12 + Math.random() * 0.15});
        animation-duration: ${14 + Math.random() * 18}s;
        animation-delay: ${Math.random() * 12}s;
        --opacity: ${0.25 + Math.random() * 0.35};
        --drift: ${(Math.random() - 0.5) * 40}px;
      `;
      ambient.appendChild(s);
    }

    /* ─────────────────────────────────────────────
       FIREFLIES (glowing warm particles)
       ───────────────────────────────────────────── */
    const fireflies = document.getElementById('fireflies');
    const fireflyColors = ['rgba(255,200,140,', 'rgba(255,180,120,', 'rgba(240,210,160,'];
    for (let i = 0; i < 8; i++) {
      const f = document.createElement('div');
      f.className = 'firefly';
      const size = 2 + Math.random() * 2.5;
      const color = fireflyColors[Math.floor(Math.random() * fireflyColors.length)];
      f.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${40 + Math.random() * 40}%;
        width: ${size}px; height: ${size}px;
        background: ${color}0.5);
        box-shadow: 0 0 ${4 + size * 2}px ${color}0.25);
        animation-duration: ${8 + Math.random() * 10}s;
        animation-delay: ${Math.random() * 12}s;
        --fly-opacity: ${0.3 + Math.random() * 0.3};
        --fly-x: ${(Math.random() - 0.5) * 80}px;
        --fly-y: ${-(15 + Math.random() * 25)}px;
      `;
      fireflies.appendChild(f);
    }

    /* ─────────────────────────────────────────────
       POLLEN (horizontal drifters)
       ───────────────────────────────────────────── */
    const pollen = document.getElementById('pollen');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'pollen';
      const size = 1 + Math.random() * 1.2;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${30 + Math.random() * 55}%;
        width: ${size}px; height: ${size}px;
        background: rgba(255,220,180,${0.08 + Math.random() * 0.1});
        animation-duration: ${18 + Math.random() * 22}s;
        animation-delay: ${Math.random() * 20}s;
        --pol-opacity: ${0.1 + Math.random() * 0.15};
        --pol-x: ${20 + Math.random() * 60}px;
        --pol-y: ${-(20 + Math.random() * 40)}px;
      `;
      pollen.appendChild(p);
    }

    /* ─────────────────────────────────────────────
       SHOW ELEMENTS SEQUENTIALLY
       ───────────────────────────────────────────── */
    const brandGroup = document.getElementById('brandGroup');
    const backlight = document.getElementById('backlight');
    const cornerTL = document.getElementById('crTL');
    const cornerTR = document.getElementById('crTR');
    const cornerBL = document.getElementById('crBL');
    const cornerBR = document.getElementById('crBR');
    const potReflection = document.getElementById('potReflection');
    const contactShadow = document.getElementById('contactShadow');
    const quoteGroup = document.getElementById('quoteGroup');

    // Phase 1: Brand + backlight + corners (after loader fades)
    setTimeout(() => {
      brandGroup.classList.add('show');
      backlight.classList.add('show');
      cornerTL.classList.add('show');
      cornerTR.classList.add('show');
      cornerBL.classList.add('show');
      cornerBR.classList.add('show');
      potReflection.classList.add('show');
    }, 300);

    // Phase 2: Contact shadow appears
    setTimeout(() => {
      contactShadow.classList.add('show');
    }, 1200);

    /* ─────────────────────────────────────────────
       FLOWER DROP SEQUENCE
       ───────────────────────────────────────────── */
    const defs = [
      { id: 'f1', s: 's0', gap: 900 },
      { id: 'f2', s: 's1', gap: 1000 },
      { id: 'f3', s: 's2', gap: 1100 },
      { id: 'f4', s: 's3', gap: 1000 },
      { id: 'f5', s: 's4', gap: 1000 },
      { id: 'f6', s: 's5', gap: 900 }
    ];

    let i = 0;

    function dropNext() {
      if (i >= defs.length) {
        // All flowers placed - show quote with flourish
        setTimeout(() => quoteGroup.classList.add('show'), 600);
        return;
      }
      const d = defs[i];
      const el = document.getElementById(d.id);
      el.style.opacity = '1';
      el.classList.add('dropping');

      // Dust burst mid-drop
      setTimeout(() => dustBurst(el), 650);

      // Landing
      setTimeout(() => {
        el.classList.remove('dropping');
        el.classList.add('placed', d.s);
        i++;
        setTimeout(dropNext, d.gap);
      }, 1300);
    }

    function dustBurst(el) {
      const scene = document.getElementById('scene');
      const rect = el.getBoundingClientRect();
      const sceneRect = scene.getBoundingClientRect();
      const cx = rect.left - sceneRect.left + rect.width / 2;
      const cy = rect.top - sceneRect.top + rect.height * 0.88;

      for (let j = 0; j < 10; j++) {
        const p = document.createElement('div');
        p.className = 'dust';
        p.style.cssText = `
          left: ${cx + (Math.random() - 0.5) * 45}px;
          top: ${cy + (Math.random() - 0.5) * 15}px;
          --dx: ${(Math.random() - 0.5) * 55}px;
          --dy: ${-(Math.random() * 40 + 8)}px;
        `;
        scene.appendChild(p);
        p.classList.add('burst');
        setTimeout(() => p.remove(), 600);
      }
    }

    // Start flower drops after initial reveal
    setTimeout(dropNext, 1600);

    /* ─────────────────────────────────────────────
       MOUSE PARALLAX
       ───────────────────────────────────────────── */
    const sceneEl = document.getElementById('scene');
    let mx = 0.5, my = 0.5;
    let currentX = 0.5, currentY = 0.5;
    let rafId = null;

    function handleMouse(e) {
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      mx = Math.min(1, Math.max(0, x));
      my = Math.min(1, Math.max(0, y));
      if (!rafId) rafId = requestAnimationFrame(updateParallax);
    }

    function handleTouch(e) {
      if (e.touches.length > 0) {
        const t = e.touches[0];
        mx = Math.min(1, Math.max(0, t.clientX / window.innerWidth));
        my = Math.min(1, Math.max(0, t.clientY / window.innerHeight));
        if (!rafId) rafId = requestAnimationFrame(updateParallax);
      }
    }

    function updateParallax() {
      rafId = null;
      // Lerp toward target for smooth motion
      currentX += (mx - currentX) * 0.08;
      currentY += (my - currentY) * 0.08;

      const rotX = (currentY - 0.5) * 3;  // -1.5 to 1.5 deg
      const rotY = (currentX - 0.5) * -3;
      const transX = (currentX - 0.5) * 6;
      const transY = (currentY - 0.5) * -3;

      sceneEl.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
        translateX(${transX}px)
        translateY(${transY}px)
      `;
    }

    document.addEventListener('mousemove', handleMouse, { passive: true });
    document.addEventListener('touchmove', handleTouch, { passive: true });

    // Reset parallax when mouse leaves
    document.addEventListener('mouseleave', () => {
      mx = 0.5; my = 0.5;
      if (!rafId) rafId = requestAnimationFrame(updateParallax);
    });
  }
})();
</script>

</body>
</html>
