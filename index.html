<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom & Clay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    color: #F0ECE6;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── SCENE ─── */
  .scene {
    position: relative;
    width: 600px;
    height: 680px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .scene::before {
    content: '';
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 550px;
    height: 550px;
    background: radial-gradient(ellipse, rgba(196,132,106,0.06) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ─── POT ─── */
  .pot-wrap {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
  }
  .pot-wrap svg {
    display: block;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
  }

  /* ─── FLOWERS (each has unique position) ─── */
  .flower {
    position: absolute;
    bottom: 185px;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 6px 20px rgba(0,0,0,0.35));
  }

  /* Each flower has its own X offset + rotation */
  .flower[data-pos="0"] { left: 50%; margin-left: -85px; }   /* far left */
  .flower[data-pos="1"] { left: 50%; margin-left: -40px; }   /* left center */
  .flower[data-pos="2"] { left: 50%; margin-left: -15px; }   /* center */
  .flower[data-pos="3"] { left: 50%; margin-left: 25px; }    /* right center */
  .flower[data-pos="4"] { left: 50%; margin-left: 65px; }    /* far right */

  /* Drop animation */
  .flower.dropping {
    animation: flowerDrop 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  .flower.placed {
    opacity: 1;
  }

  @keyframes flowerDrop {
    0% {
      opacity: 0;
      transform: translateY(-450px) scale(0.3) rotate(-20deg);
      filter: blur(8px) drop-shadow(0 6px 20px rgba(0,0,0,0.35));
    }
    12% {
      opacity: 0.6;
      filter: blur(3px) drop-shadow(0 6px 20px rgba(0,0,0,0.35));
    }
    25% {
      opacity: 1;
      filter: blur(0) drop-shadow(0 6px 20px rgba(0,0,0,0.35));
    }
    55% {
      transform: translateY(14px) scale(1.04) rotate(3deg);
    }
    70% {
      transform: translateY(-8px) scale(0.97) rotate(-2deg);
    }
    82% {
      transform: translateY(4px) scale(1.01) rotate(0.8deg);
    }
    92% {
      transform: translateY(-2px) scale(0.995);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1) rotate(0deg);
      filter: blur(0) drop-shadow(0 6px 20px rgba(0,0,0,0.35));
    }
  }

  /* Gentle sway after landing */
  .flower.placed.sway1 { animation: sway1 5s ease-in-out infinite 0.3s; }
  .flower.placed.sway2 { animation: sway2 6s ease-in-out infinite 0.5s; }
  .flower.placed.sway3 { animation: sway3 5.5s ease-in-out infinite 0.2s; }
  .flower.placed.sway4 { animation: sway4 7s ease-in-out infinite 0.4s; }
  .flower.placed.sway5 { animation: sway5 4.5s ease-in-out infinite 0.6s; }

  @keyframes sway1 { 0%,100%{transform:rotate(0)} 50%{transform:rotate(1.2deg)} }
  @keyframes sway2 { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-1deg)} }
  @keyframes sway3 { 0%,100%{transform:rotate(0)} 50%{transform:rotate(0.8deg)} }
  @keyframes sway4 { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-1.3deg)} }
  @keyframes sway5 { 0%,100%{transform:rotate(0)} 50%{transform:rotate(1deg)} }

  /* ─── DUST ─── */
  .dust {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #C4846A;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 15;
  }
  .dust.burst {
    animation: dustPop 0.7s ease-out forwards;
  }
  @keyframes dustPop {
    0% { opacity: 0.8; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* ─── AMBIENT ─── */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .spec {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(196,132,106,0.25);
    border-radius: 50%;
    animation: specUp linear infinite;
  }
  @keyframes specUp {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-5vh) scale(1); }
  }

  /* ─── BRAND ─── */
  .brand {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    color: rgba(196,132,106,0.4);
    z-index: 20;
    text-transform: uppercase;
  }

  /* ─── BOTTOM QUOTE ─── */
  .quote {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(196,132,106,0.3);
    z-index: 20;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
    white-space: nowrap;
  }
  .quote.show { opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    .flower.dropping { animation: none; opacity: 1; transform: none; }
    .flower.placed { animation: none !important; }
    .dust.burst { animation: none; }
    .spec { animation: none; }
  }

  @media (max-width: 650px) {
    .scene { width: 100vw; transform: scale(0.7); transform-origin: center bottom; }
  }
</style>
</head>

    const s=document.createElement('div');
    s.className='spec';
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(12+Math.random()*18)+'s';
    s.style.animationDelay=Math.random()*14+'s';
    s.style.width=s.style.height=(1.5+Math.random()*2)+'px';
    c.appendChild(s);
  }
})();

// Flower sequence - each flower drops one by one, SPREAD across pot
const flowerDefs=[
  {id:'f1', sway:'sway1', delay:1800},  // far left
  {id:'f2', sway:'sway2', delay:2200},  // left center
  {id:'f3', sway:'sway3', delay:2400},  // center
  {id:'f4', sway:'sway4', delay:2200},  // right center
  {id:'f5', sway:'sway5', delay:2000},  // far right
];

let i=0;

function dropNext(){
  if(i>=flowerDefs.length){
    document.getElementById('quote').classList.add('show');
    return;
  }
  const f=flowerDefs[i];
  const el=document.getElementById(f.id);

  el.style.opacity='1';
  el.classList.add('dropping');

  setTimeout(()=>spawnDust(el), 1100);

  setTimeout(()=>{
    el.classList.remove('dropping');
    el.classList.add('placed', f.sway);
    i++;
    setTimeout(dropNext, f.delay);
  }, 2000);
}

function spawnDust(el){
  const scene=document.getElementById('scene');
  const rect=el.getBoundingClientRect();
  const sRect=scene.getBoundingClientRect();
  const cx=rect.left-sRect.left+rect.width/2;
  const cy=rect.top-sRect.top+rect.height*0.85;
  for(let j=0;j<10;j++){
    const p=document.createElement('div');
    p.className='dust';
    p.style.left=cx+(Math.random()-0.5)*50+'px';
    p.style.top=cy+(Math.random()-0.5)*15+'px';
    p.style.setProperty('--dx',(Math.random()-0.5)*60+'px');
    p.style.setProperty('--dy',-(Math.random()*40+10)+'px');
    scene.appendChild(p);
    p.classList.add('burst');
    setTimeout(()=>p.remove(),700);
  }
}

// Auto start
setTimeout(dropNext, 1200);
</script>
